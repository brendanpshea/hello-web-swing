<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="layout">
        <section class="panel intro">
            <p class="eyebrow">Spring Boot Arcade</p>
            <h1>Snake</h1>
            <p class="summary">Use the arrow keys or WASD to collect fruit, grow the snake, and avoid walls or your own tail.</p>
            <div class="stats" aria-label="Game stats">
                <div class="stat-card">
                    <span class="stat-label">Score</span>
                    <strong id="score">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Top Score</span>
                    <strong id="best-score">0</strong>
                </div>
            </div>
            <button id="restart-button" type="button">Restart Game</button>
            <p id="status" class="status" role="status">Press any movement key to begin.</p>

            <form id="score-form" class="score-form" hidden>
                <label class="score-form-label" for="initials-input">Save your score</label>
                <div class="score-form-row">
                    <input id="initials-input" name="initials" type="text" maxlength="3" minlength="2" pattern="[A-Za-z]{2,3}" autocomplete="off" placeholder="ABC" required>
                    <button id="save-score-button" type="submit">Submit</button>
                </div>
                <p id="submit-status" class="submit-status" role="status"></p>
            </form>

            <section class="leaderboard" aria-labelledby="leaderboard-title">
                <div class="leaderboard-header">
                    <h2 id="leaderboard-title">Leaderboard</h2>
                    <span>Top 10</span>
                </div>
                <ol id="leaderboard-list" class="leaderboard-list">
                    <li class="leaderboard-empty">No scores yet.</li>
                </ol>
            </section>
        </section>

        <section class="panel board-panel">
            <canvas id="game-board" width="480" height="480" aria-label="Snake game board" role="img"></canvas>
            <div class="controls" aria-label="Controls help">
                <span>Move: Arrow Keys / WASD</span>
                <span>Pause: Space</span>
            </div>
        </section>
    </main>

    <script src="/snake.js"></script>
</body>
</html>
